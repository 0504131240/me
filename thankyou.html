<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>תודה – הכנסת ספר תורה</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Frank Ruhl Libre', serif;
      background: #0a1628;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image: radial-gradient(ellipse at top, #1a2d5a 0%, #0a1628 60%);
    }

    .card {
      background: linear-gradient(160deg, #fdf6e3 0%, #f5e6c8 50%, #fdf0d0 100%);
      border-radius: 16px;
      border: 3px solid #c9a227;
      box-shadow: 0 0 0 6px rgba(201,162,39,0.2), 0 20px 60px rgba(0,0,0,0.6);
      padding: 48px 36px;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .icon { font-size: 72px; margin-bottom: 20px; display: block; }

    h1 { font-size: 32px; font-weight: 900; color: #1a3a6b; margin-bottom: 12px; }

    p { font-size: 17px; color: #5a4825; line-height: 1.7; margin-bottom: 8px; }

    .gold-note {
      margin-top: 24px;
      font-size: 15px;
      color: #c9a227;
      font-weight: 700;
      padding: 14px;
      border: 1px solid rgba(201,162,39,0.4);
      border-radius: 10px;
      background: rgba(201,162,39,0.07);
    }

    .back-btn {
      display: inline-block;
      margin-top: 28px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #1a3a6b, #0d2247);
      color: #c9a227;
      border-radius: 12px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Frank Ruhl Libre', serif;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">🎉</span>
    <h1>תודה רבה!</h1>
    <p>אישור ההגעה שלכם התקבל בהצלחה.</p>
    <p>נשמח לראותכם באירוע!</p>
    <div class="gold-note">
      יום רביעי, כג תמוז תשפ"ו<br/>
      8/7/26 בשעה 19:45<br/>
      אולם אחיעזר, אלעד
    </div>
    <a href="index.html" class="back-btn">חזרה לדף הראשי</a>
  </div>
</body>
</html>
